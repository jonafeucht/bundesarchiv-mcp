name: Update LanceDB Index
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat-lancedb
    paths:
      - "mcp-data/**"
jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Index from Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p mcp-server/lancedb_index

          # Iterate through releases until we find one with the index asset
          PAGE=1
          FOUND=false
          while [ "$FOUND" = "false" ]; do
            TAGS=$(gh release list --limit 20 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
            if [ -z "$TAGS" ]; then
              echo "No more releases to check."
              break
            fi

            while IFS= read -r TAG; do
              echo "Checking release $TAG for index asset..."
              if gh release download "$TAG" --pattern "lancedb_index.tar.gz" --dir mcp-server/ 2>/dev/null; then
                echo "Found index in release $TAG."
                FOUND=true
                break
              fi
            done <<EOF
          $TAGS
          EOF

            [ "$FOUND" = "true" ] && break
            PAGE=$((PAGE + 1))
            # gh release list doesn't support --page, so we break if first 20 all failed
            echo "No index found in these releases, stopping search."
            break
          done

          if [ -f mcp-server/lancedb_index.tar.gz ]; then
            tar -xzf mcp-server/lancedb_index.tar.gz -C mcp-server/
            rm mcp-server/lancedb_index.tar.gz
          else
            echo "No index asset found in any release, proceeding with fresh index."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install lancedb==0.33.0 pandas sentence-transformers pymupdf numpy python-dotenv mcp starlette uvicorn pylance==7.0.0

      - name: Generate/Update LanceDB Index
        env:
          PDF_DIR: ${{ github.workspace }}/mcp-data
          DB_URI: ${{ github.workspace }}/mcp-server/lancedb_index
        run: python3 ingest.py
      - name: Upload index to latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf lancedb_index.tar.gz -C mcp-server lancedb_index

          LATEST_TAG=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases | awk -F'\t' '{print $3}')
          if [ -z "$LATEST_TAG" ]; then
            echo "ERROR: No release found to upload index to." >&2
            exit 1
          fi

          CURRENT_DATE=$(date +'%Y-%m-%d')
          NEW_TITLE="LanceDB Index Update ($CURRENT_DATE)"

          echo "Updating release title to: $NEW_TITLE"
          gh release edit "$LATEST_TAG" --title "$NEW_TITLE"

          echo "Uploading index to release: $LATEST_TAG"
          gh release upload "$LATEST_TAG" lancedb_index.tar.gz --clobber
