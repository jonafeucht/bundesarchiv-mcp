name: Build & Publish
on:
  push:
    tags:
      - "v*"
env:
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LanceDB index
        id: cache-lancedb
        uses: actions/cache@v4
        with:
          path: mcp-server/lancedb_index
          key: lancedb-index-${{ hashFiles('mcp-data/**', 'ingest.py') }}
          restore-keys: |
            lancedb-index-

      - name: Set up Python
        if: steps.cache-lancedb.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.cache-lancedb.outputs.cache-hit != 'true'
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install lancedb==0.33.0 pandas sentence-transformers pymupdf numpy python-dotenv mcp starlette uvicorn

      - name: Generate LanceDB Database
        if: steps.cache-lancedb.outputs.cache-hit != 'true'
        env:
          PDF_DIR: ${{ github.workspace }}/mcp-data
          DB_URI: ${{ github.workspace }}/mcp-server/lancedb_index
        run: python3 ingest.py

      - name: Verify index
        if: steps.cache-lancedb.outputs.cache-hit != 'true'
        run: |
          python3 -c "
          import lancedb
          db = lancedb.connect('${{ github.workspace }}/mcp-server/lancedb_index')
          print('Tables:', db.table_names())
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
            docker.io/doppeltilde/bundesarchiv-mcp
          tags: |
            type=ref,event=tag

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: doppeltilde
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
