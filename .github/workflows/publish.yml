name: Build & Publish
on:
  push:
    tags:
      - "v*"
env:
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: doppeltilde/bundesarchiv-mcp
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag-suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag-suffix: arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: doppeltilde
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push single arch
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.tag-suffix }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }}-${{ matrix.tag-suffix }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Log in GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: doppeltilde
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }} \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
