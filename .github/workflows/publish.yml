name: Build & Publish
on:
  push:
    tags:
      - "v*"
env:
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changes
        id: check-changes
        run: |
          # Check if data or script changed compared to the previous tag
          if git describe --tags --abbrev=0 HEAD^ >/dev/null 2>&1; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
            CHANGES=$(git diff --name-only $PREV_TAG HEAD -- mcp-data/ ingest.py)
            if [ -z "$CHANGES" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No changes in data or ingestion script."
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Changes detected in data or ingestion script."
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "No previous tag found. Forcing generation."
          fi

      - name: Fetch Index from Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p mcp-server/lancedb_index
          # Try downloading from the latest existing release, ignore error if none exists
          gh release download --pattern "lancedb_index.tar.gz" --dir mcp-server/ || echo "No previous release index found."
          if [ -f mcp-server/lancedb_index.tar.gz ]; then
            tar -xzf mcp-server/lancedb_index.tar.gz -C mcp-server/
            rm mcp-server/lancedb_index.tar.gz
            echo "index_exists=true" >> $GITHUB_ENV
          else
            echo "index_exists=false" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.index_exists == 'false' || steps.check-changes.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: env.index_exists == 'false' || steps.check-changes.outputs.changed == 'true'
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install lancedb==0.33.0 pandas sentence-transformers pymupdf numpy python-dotenv mcp starlette uvicorn

      - name: Generate/Update LanceDB Database
        if: env.index_exists == 'false' || steps.check-changes.outputs.changed == 'true'
        env:
          PDF_DIR: ${{ github.workspace }}/mcp-data
          DB_URI: ${{ github.workspace }}/mcp-server/lancedb_index
        run: python3 ingest.py

      - name: Create GitHub Release & Upload Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Package the index directory as a single archive asset
          tar -czf lancedb_index.tar.gz -C mcp-server lancedb_index

          # Create the release if it doesn't exist, or update it, then upload the asset
          gh release create ${{ github.ref_name }} lancedb_index.tar.gz --title "${{ github.ref_name }}" --notes "Automated release with LanceDB index." || \
          gh release upload ${{ github.ref_name }} lancedb_index.tar.gz --clobber

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
            docker.io/doppeltilde/bundesarchiv-mcp
          tags: |
            type=ref,event=tag

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: doppeltilde
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
