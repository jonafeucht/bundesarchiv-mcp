name: Artifact Cleanup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove Old Artifacts But Keep Latest
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: "3 days"
          minimum-matches: 1
          skip-tags: true
